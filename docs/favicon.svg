<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Gradient for depth -->
    <linearGradient id="diamondGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9488"/>
      <stop offset="50%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#115E59"/>
    </linearGradient>
    <!-- Subtle inner shadow -->
    <filter id="innerGlow">
      <feFlood flood-color="#5EEAD4" flood-opacity="0.3"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feGaussianBlur stdDeviation="1"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background diamond shape -->
  <path
    d="M16 2 L30 16 L16 30 L2 16 Z"
    fill="url(#diamondGrad)"
    filter="url(#innerGlow)"
  />

  <!-- Inner diamond cutout creating the ◈ effect -->
  <path
    d="M16 8 L24 16 L16 24 L8 16 Z"
    fill="none"
    stroke="#5EEAD4"
    stroke-width="1.5"
    opacity="0.9"
  />

  <!-- Redaction bars - symbolizing PII protection -->
  <rect x="11" y="14" width="10" height="2" rx="0.5" fill="#F0FDFA" opacity="0.95"/>
  <rect x="13" y="17.5" width="6" height="1.5" rx="0.5" fill="#5EEAD4" opacity="0.7"/>

  <!-- Subtle highlight on top edge -->
  <path
    d="M16 2 L30 16"
    fill="none"
    stroke="#99F6E4"
    stroke-width="0.5"
    opacity="0.6"
  />
</svg>
